<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hunterz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a1a;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #0a0a1a;
        }

        /* Cyber-Highscore-Overlay (Eingabe bei Game Over) */
        #highscoreOverlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 26, 0.95); 
            border: 2px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
            padding: 30px 25px;
            border-radius: 12px;
            text-align: center;
            z-index: 100;
            width: 90%;
            max-width: 420px;
        }
        #highscoreOverlay h3 {
            color: #00ffcc;
            margin-bottom: 15px;
            font-size: 22px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        #highscoreOverlay p {
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 15px;
            opacity: 0.8;
        }
        #playerNameInput {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ffffff;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
        }
        #playerNameInput:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }
        #submitHighscoreBtn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc;
            color: #00ffcc;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #submitHighscoreBtn:hover {
            background: #00ffcc;
            color: #0a0a1a;
            box-shadow: 0 0 15px #00ffcc;
        }

        /* ===== GLOBALES LEADERBOARD OVERLAY ===== */
        #leaderboardOverlay, 
        #leaderboardOverlay[style*="display: block"] {
            display: none; 
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 26, 0.92);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
            padding: 20px 25px;
            border-radius: 16px;
            width: 92%;
            max-width: 950px;
            height: 85vh;
            max-height: 85vh;
            z-index: 1000;
            box-sizing: border-box;
        }

        #leaderboardOverlay[style*="display: block"],
        #leaderboardOverlay[style*="display: flex"] {
            display: flex !important;
            flex-direction: column;
            justify-content: space-between;
        }

        #leaderboardOverlay h3 {
            color: #00ffcc;
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            text-align: center;
            flex-shrink: 0;
        }

        .table-responsive {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            margin-bottom: 15px;
            padding-right: 5px;
            border: 1px solid rgba(0, 255, 204, 0.15);
            border-radius: 8px;
        }

        .table-responsive::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .table-responsive::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .table-responsive::-webkit-scrollbar-thumb {
            background: #00ffcc;
            border-radius: 10px;
            box-shadow: 0 0 10px #00ffcc;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            color: #ffffff;
            font-size: 15px;
            white-space: nowrap;
        }

        .leaderboard-table th {
            position: sticky;
            top: 0;
            background: #0d1127;
            color: #00ffcc;
            border-bottom: 2px solid rgba(0, 255, 204, 0.4);
            padding: 10px 8px;
            text-align: left;
            font-size: 14px;
            z-index: 2;
        }

        .leaderboard-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .leaderboard-table tr:nth-child(1) td { color: #ffd700; font-weight: bold; }
        .leaderboard-table tr:nth-child(2) td { color: #c0c0c0; }
        .leaderboard-table tr:nth-child(3) td { color: #cd7f32; }

        #closeLeaderboardBtn {
            flex-shrink: 0;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            transition: all 0.2s ease;
        }

        #closeLeaderboardBtn:hover {
            background: #00ffcc;
            color: #0a0a1a;
            box-shadow: 0 0 20px #00ffcc;
        }

        /* ===== DEV / CHEAT MENU OVERLAY (VERTIKAL & MOBILE-FRIENDLY) ===== */
        #devMenuOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .dev-modal {
            background: rgba(18, 12, 28, 0.95);
            border: 2px solid #ff0055;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.4);
            border-radius: 14px;
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 16px;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        .dev-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 0, 85, 0.3);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .dev-header h3 {
            margin: 0;
            color: #ff0055;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .dev-close-x {
            background: none;
            border: none;
            color: #ff0055;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            padding: 0 5px;
        }

        .dev-section {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .dev-section-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: #00ffcc;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .dev-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .dev-control-group {
            margin-bottom: 14px;
        }

        .dev-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        /* Lange, dicke Schieberegler für einfache Touch-Bedienung */
        .dev-slider {
            width: 100%;
            height: 14px;
            border-radius: 7px;
            background: #333;
            outline: none;
            accent-color: #00ffcc;
            cursor: pointer;
        }

        .dev-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .dev-btn {
            background: #1e152a;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dev-btn:active {
            transform: scale(0.96);
        }

        .toggle-btn {
            min-width: 70px;
            border-color: #ff0055;
            color: white;
        }

        .danger-btn {
            border-color: #ff0055;
            color: #ff0055;
        }

        .close-full-btn {
            width: 100%;
            background: #ff0055;
            color: white;
            border: none;
            padding: 12px;
            margin-top: 5px;
            font-size: 0.95rem;
        }
        /* Styling für Dev-Menu Buttons */
        .dev-menu-btn {
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .dev-menu-btn:hover {
            background-color: #444 !important; /* Etwas heller bei Hover */
            transform: scale(1.03); /* Leichtes Vergrößern */
            border-color: #00ffcc !important; /* Cyan-Leuchten beim Hover */
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }

        .dev-menu-btn:active {
            transform: scale(0.97); /* Klick-Feedback */
        }

        /* Medienabfrage für Mobile */
        @media (max-width: 768px) {
            #leaderboardOverlay {
                width: 95%;
                height: 90vh;
                max-height: 90vh;
                padding: 15px;
            }
            .leaderboard-table {
                font-size: 12px;
            }
            .leaderboard-table th, .leaderboard-table td {
                padding: 8px 4px;
            }
            #closeLeaderboardBtn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- Das Highscore Eingabe-Fenster (Game Over) -->
    <div id="highscoreOverlay" style="display: none;">
        <h3>NEW RECORD!</h3>
        <div id="scoreDisplay" style="color: #fff; margin-bottom: 15px; font-size: 16px;">
            <p>Score: <span id="valScore" style="color: #00ffcc;">0</span></p>
            <p>Level: <span id="valLevel" style="color: #00ffcc;">1</span></p>
            <p>Time: <span id="valTime" style="color: #00ffcc;">0:00</span></p>
        </div>
        
        <p style="font-size: 12px; margin-bottom: 10px;">Enter your name to save:</p>
        <input type="text" id="playerNameInput" placeholder="Name (max 15)" maxlength="15">
        <button id="submitHighscoreBtn">Submit Score</button>
    </div>

    <!-- Das globale Leaderboard (Hauptmenü) -->
    <div id="leaderboardOverlay" style="display: none;">
        <h3>🏆 GLOBAL TOP 100</h3>
        <div class="table-responsive">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Score</th>
                        <th>Lvl</th>
                        <th>Klasse</th>
                        <th>Waffe</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="leaderboardRows">
                    <!-- Hier haut das JavaScript die Zeilen rein -->
                </tbody>
            </table>
        </div>
        <!-- Zurück-Button -->
        <button id="closeLeaderboardBtn">Zurück</button>
    </div>

    <!-- DEV / CHEAT MENU OVERLAY (Vertikal & Responsive für Mobile) -->
    <div id="devMenuOverlay" class="dev-overlay" style="display: none;">
        <div class="dev-modal">
            <!-- Header mit Schließen-X -->
            <div class="dev-header">
                <h3>🔧 DEV / CHEAT MENU</h3>
                <button id="closeDevMenuBtn" class="dev-close-x">&times;</button>
            </div>

            <div class="dev-body">
                <!-- Bereich 1: Player Stats & Multiplier -->
                <div class="dev-section">
                    <div class="dev-section-title">PLAYER STATS</div>
                    
                    <div class="dev-row">
                        <span>Godmode:</span>
                        <button id="godModeBtn" class="dev-btn toggle-btn">OFF</button>
                    </div>

                    <div class="dev-control-group">
                        <div class="dev-label-row">
                            <span>Damage Multiplier:</span>
                            <strong id="dmgMultVal">1x</strong>
                        </div>
                        <input type="range" id="dmgMultSlider" min="1" max="10" step="0.5" value="1" class="dev-slider">
                    </div>

                    <div class="dev-control-group">
                        <div class="dev-label-row">
                            <span>XP Multiplier:</span>
                            <strong id="xpMultVal">1x</strong>
                        </div>
                        <input type="range" id="xpMultSlider" min="1" max="10" step="0.5" value="1" class="dev-slider">
                    </div>
                </div>

                <!-- Bereich 2: Schnellausführungen -->
                <div class="dev-section">
                    <div class="dev-section-title">ACTIONS</div>
                    <div class="dev-grid">
                        <button id="addXpBtn" class="dev-btn">+1 LVL</button>
                        <button id="killAllBtn" class="dev-btn danger-btn">Kill All</button>
                        <button id="spawnZaferBtn" class="dev-btn">Boss Zafer</button>
                        <button id="spawnSonerBtn" class="dev-btn">Boss Soner</button>
                    </div>
                </div>
            </div>

            <!-- Footer Schließen-Button -->
            <div class="dev-footer">
                <button id="closeDevMenuBtnBottom" class="dev-btn close-full-btn">Dev Menü Schließen</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
